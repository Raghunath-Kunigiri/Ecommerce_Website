<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF2E8"/>
      <stop offset="1" stop-color="#FFE8D6"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7A51" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FF6A3D" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1240" cy="220" r="320" fill="#FF6A3D" opacity="0.08"/>
  <circle cx="360" cy="980" r="380" fill="#FFD666" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="170" y="190" width="1260" height="820" rx="56" fill="#FFFFFF" opacity="0.94"/>
  </g>

  <rect x="260" y="270" width="1080" height="520" rx="44" fill="url(#chip)" stroke="#1F1A16" stroke-opacity="0.10"/>
  <g opacity="0.85">
    <polygon points="430,400 560,320 690,400 560,480" fill="#FFF9F4" stroke="#1F1A16" stroke-opacity="0.14" stroke-width="6"/>
    <polygon points="700,400 830,320 960,400 830,480" fill="#FFF9F4" stroke="#1F1A16" stroke-opacity="0.14" stroke-width="6"/>
    <polygon points="970,400 1100,320 1230,400 1100,480" fill="#FFF9F4" stroke="#1F1A16" stroke-opacity="0.14" stroke-width="6"/>
    <polygon points="565,610 695,530 825,610 695,690" fill="#FFF9F4" stroke="#1F1A16" stroke-opacity="0.14" stroke-width="6"/>
    <polygon points="835,610 965,530 1095,610 965,690" fill="#FFF9F4" stroke="#1F1A16" stroke-opacity="0.14" stroke-width="6"/>
  </g>

  <text x="300" y="900" font-family="ui-serif, Georgia, serif" font-size="72" fill="#1F1A16" font-weight="700">
    Kaju Katli
  </text>
  <text x="300" y="970" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="34" fill="#1F1A16" opacity="0.70">
    Premium Mithai " Gift pack ready
  </text>
  <text x="1290" y="930" text-anchor="end" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="44" fill="#FF6A3D" font-weight="700">
    ¹
  </text>
</svg>

